repos:
  - repo: local
    hooks:
      - id: black
        name: Run black
        language: system
        entry: ./scripts/run-black.sh
        stages: [pre-commit]
        pass_filenames: false
        always_run: true

      - id: isort
        name: Run isort
        language: system
        entry: ./scripts/run-isort.sh
        stages: [pre-commit]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        language_version: python3.13
        files: \.(pyi?|ipynb)$
        additional_dependencies: ["flake8-docstrings"]
        args: ["--max-line-length=79", "--select=E,F,W,C90", "--ignore=E501"]
        exclude: '__pycache__|.*\.pyc|.venv'
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: safety-check
        name: Run safety check
        language: system
        entry: ./scripts/safety-check.sh
        stages: [pre-commit]
        pass_filenames: false
        always_run: true
